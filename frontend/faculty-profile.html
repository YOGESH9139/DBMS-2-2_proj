<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Profile — SMS</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>Student Management System</h1>
      <p class="subtitle">Faculty Profile</p>
    </div>
  </div>
</header>

<div class="profile-container" id="profile-root">
  <p class="no-data">Loading faculty profile...</p>
</div>

<div id="toast"></div>
<script src="js/api.js"></script>
<script>
(async function(){
  const id = new URLSearchParams(location.search).get('id');
  const root = document.getElementById('profile-root');
  if(!id){ root.innerHTML='<p class="no-data">No faculty ID provided.</p>'; return; }

  try {
    const d = await api('/faculty/'+id+'/profile');
    const f = d.faculty;
    const initials = f.faculty_name.split(' ').map(w=>w[0]).join('').toUpperCase();

    // Courses table
    const courseTbl = d.courses.length
      ? `<table class="profile-table"><thead><tr><th>Course</th><th>Credits</th><th>Department</th></tr></thead><tbody>${
          d.courses.map(c=>`<tr><td>${c.course_name}</td><td>${c.credits}</td><td>${c.department_name||'N/A'}</td></tr>`).join('')
        }</tbody></table>`
      : '<p class="no-data">No courses assigned.</p>';

    // Students table
    const studTbl = d.students.length
      ? `<table class="profile-table"><thead><tr><th>Student ID</th><th>Student Name</th><th>Email</th><th>Course</th></tr></thead><tbody>${
          d.students.map(s=>`<tr>
            <td>${s.student_id}</td>
            <td><a class="name-link" href="student-profile.html?id=${s.student_id}">${s.student_name}</a></td>
            <td>${s.email||'N/A'}</td>
            <td>${s.course_name}</td>
          </tr>`).join('')
        }</tbody></table>`
      : '<p class="no-data">No students enrolled in courses taught by this faculty.</p>';

    root.innerHTML = `
      <a href="index.html" class="back-link">← Back to Dashboard</a>

      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-avatar">${initials}</div>
          <div>
            <div class="profile-name">${f.faculty_name}</div>
            <div class="profile-meta">
              <span>ID: ${f.faculty_id}</span>
              <span>Dept: ${f.department_name||'N/A'}</span>
            </div>
          </div>
        </div>
        <div class="info-grid">
          <div class="info-item"><label>Email</label><div class="info-val">${f.email||'N/A'}</div></div>
          <div class="info-item"><label>Department</label><div class="info-val">${f.department_name||'N/A'}</div></div>
          <div class="info-item"><label>Courses Teaching</label><div class="info-val">${d.courses.length}</div></div>
          <div class="info-item"><label>Total Students</label><div class="info-val">${d.students.length}</div></div>
        </div>
      </div>

      <div class="profile-section"><h3>📚 Courses Teaching</h3>${courseTbl}</div>
      <div class="profile-section"><h3>👨‍🎓 Students Under This Faculty</h3>${studTbl}</div>
    `;
  } catch(e) {
    root.innerHTML=`<a href="index.html" class="back-link">← Back</a><p class="no-data" style="color:red">Error: ${e.message}</p>`;
  }
})();
</script>
</body>
</html>
